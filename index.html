<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the canvas extend under notches/home indicators (safe areas
         are handled in CSS via env(safe-area-inset-*)); maximum-scale/user-scalable kill
         double-tap + pinch page zoom on iOS Safari, which ignores touch-action for page zoom. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Haystack</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
